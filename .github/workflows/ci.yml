name: TypeScript CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        # This will check for syntax and style issues defined in your config
        run: npx eslint .

      - name: Run All Tests and Tasks
        # This runs your .test.ts files AND your Task files with assertions
        run: npx vitest run --include "**/*.{ts,test.ts}" --exclude "node_modules/**"
