name: TypeScript CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        run: npx eslint .

      - name: Run All Tests and Tasks
        run: npx vitest run "**/*.ts" --exclude "node_modules/**" --passWithNoTests
