name: TypeScript CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        # Checks for syntax and style issues (like the 'const' fixes we did)
        run: npx eslint .

      - name: Run All Tests and Tasks
        # 1. We pass the file pattern directly instead of using --include
        # 2. --passWithNoTests prevents failure on files without assertions
        # 3. Vitest will execute your 'Task' files and catch any 'AssertionError'
        run: npx vitest run "**/*.ts" --exclude "node_modules/**" --passWithNoTests
